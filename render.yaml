# Render deployment configuration
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: gamestyle-hub
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: OPENWEATHER_API_KEY
        sync: false
