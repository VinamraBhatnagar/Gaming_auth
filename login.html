<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GameStyle Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --border-default: #30363d;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --accent-green: #238636;
            --accent-green-hover: #2ea043;
            --accent-blue: #58a6ff;
            --accent-purple: #a371f7;
            --accent-pink: #db61a2;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow-x: hidden;
            overflow-y: auto;
            padding: 20px 0;
        }

        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .gradient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.4;
            animation: float 20s infinite ease-in-out;
        }

        .gradient-orb:nth-child(1) {
            width: 500px;
            height: 500px;
            background: var(--accent-purple);
            top: -150px;
            right: -100px;
        }

        .gradient-orb:nth-child(2) {
            width: 400px;
            height: 400px;
            background: var(--accent-blue);
            bottom: -100px;
            left: -100px;
            animation-delay: -5s;
        }

        .gradient-orb:nth-child(3) {
            width: 300px;
            height: 300px;
            background: var(--accent-green);
            top: 50%;
            left: 50%;
            animation-delay: -10s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(-30px, -20px) scale(1.03); }
        }

        .grid-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(48, 54, 61, 0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(48, 54, 61, 0.3) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 0;
        }

        .auth-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            padding: 20px;
            animation: fadeInUp 0.8s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-default);
            border-radius: 16px;
            padding: 45px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .logo {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo a {
            color: var(--text-primary);
            font-size: 1.8rem;
            font-weight: 700;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .logo a i {
            background: linear-gradient(135deg, var(--accent-green), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2rem;
        }

        .logo a span {
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-top: 10px;
        }

        .tab-switcher {
            display: flex;
            background: var(--bg-tertiary);
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 30px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: inherit;
            position: relative;
            overflow: hidden;
        }

        .tab-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.4s ease, height 0.4s ease;
        }

        .tab-btn:active::before {
            width: 200px;
            height: 200px;
        }

        .tab-btn:hover {
            color: var(--text-primary);
            transform: scale(1.02);
        }

        .tab-btn.active {
            background: var(--accent-green);
            color: white;
            box-shadow: 0 4px 15px rgba(35, 134, 54, 0.4);
            animation: tabPulse 2s ease-in-out infinite;
        }

        @keyframes tabPulse {
            0%, 100% { box-shadow: 0 4px 15px rgba(35, 134, 54, 0.4); }
            50% { box-shadow: 0 4px 25px rgba(35, 134, 54, 0.6); }
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            color: var(--text-primary);
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i.fa-lock,
        .input-wrapper i.fa-envelope,
        .input-wrapper i.fa-user {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            transition: color 0.3s ease;
            pointer-events: none;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 15px 14px 45px;
            background: var(--bg-primary);
            border: 1px solid var(--border-default);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .input-wrapper input[type="password"],
        .input-wrapper input.password-input {
            padding-right: 50px;
        }

        .input-wrapper input::placeholder {
            color: var(--text-secondary);
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
        }

        .input-wrapper input:focus ~ i.fa-lock,
        .input-wrapper input:focus ~ i.fa-envelope,
        .input-wrapper input:focus ~ i.fa-user {
            color: var(--accent-blue);
        }

        .input-wrapper .toggle-password {
            position: absolute;
            right: 15px;
            left: auto;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-secondary);
            z-index: 10;
            padding: 5px;
            font-size: 1rem;
        }

        .input-wrapper .toggle-password:hover {
            color: var(--accent-blue);
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 0.9rem;
        }

        .remember-forgot label {
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .remember-forgot input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--accent-green);
        }

        .remember-forgot a {
            color: var(--accent-blue);
            text-decoration: none;
        }

        .remember-forgot a:hover {
            text-decoration: underline;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent-green);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
            animation: submitGlow 2s ease-in-out infinite;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .submit-btn:hover::before {
            left: 100%;
        }

        .submit-btn:hover {
            background: var(--accent-green-hover);
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 30px rgba(35, 134, 54, 0.5), 0 0 40px rgba(35, 134, 54, 0.2);
            animation: none;
        }

        .submit-btn:active {
            transform: translateY(-1px) scale(0.98);
        }

        @keyframes submitGlow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(35, 134, 54, 0.4); }
            50% { box-shadow: 0 0 0 8px rgba(35, 134, 54, 0); }
        }

        .submit-btn.loading {
            pointer-events: none;
            opacity: 0.8;
        }

        .submit-btn .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        .submit-btn.loading .spinner {
            display: block;
        }

        .submit-btn.loading .btn-text {
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-default);
        }

        .divider span {
            padding: 0 15px;
        }

        .social-login {
            display: flex;
            gap: 12px;
        }

        .social-btn {
            flex: 1;
            padding: 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-default);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .social-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.4s ease, height 0.4s ease;
        }

        .social-btn:active::before {
            width: 150px;
            height: 150px;
        }

        .social-btn i {
            transition: transform 0.3s ease;
        }

        .social-btn:hover {
            background: var(--bg-primary);
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .social-btn:hover i {
            transform: scale(1.2) rotate(-5deg);
        }

        .social-btn:active {
            transform: translateY(-1px) scale(1);
        }

        .social-btn.google:hover { border-color: #ea4335; color: #ea4335; box-shadow: 0 8px 20px rgba(234, 67, 53, 0.3); }
        .social-btn.discord:hover { border-color: #5865f2; color: #5865f2; box-shadow: 0 8px 20px rgba(88, 101, 242, 0.3); }
        .social-btn.github:hover { border-color: var(--text-primary); box-shadow: 0 8px 20px rgba(240, 246, 252, 0.2); }

        .guest-login {
            margin-top: 25px;
            text-align: center;
        }

        .guest-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: transparent;
            border: 1px solid var(--border-default);
            color: var(--text-secondary);
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 0.95rem;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .guest-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(163, 113, 247, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .guest-btn:hover::before {
            left: 100%;
        }

        .guest-btn i {
            transition: transform 0.3s ease;
        }

        .guest-btn:hover {
            border-color: var(--accent-purple);
            color: var(--accent-purple);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(163, 113, 247, 0.2);
            background: rgba(163, 113, 247, 0.05);
        }

        .guest-btn:hover i {
            transform: scale(1.1);
        }

        .guest-btn:active {
            transform: translateY(0);
        }

        .back-link {
            text-align: center;
            margin-top: 25px;
        }

        .back-link a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 8px 16px;
            border-radius: 8px;
        }

        .back-link a i {
            transition: transform 0.3s ease;
        }

        .back-link a:hover {
            color: var(--accent-blue);
            background: rgba(88, 166, 255, 0.1);
            transform: translateX(-5px);
        }

        .back-link a:hover i {
            transform: translateX(-3px);
        }

        .error-message, .success-message {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
            align-items: center;
            gap: 10px;
        }

        .error-message {
            background: rgba(248, 81, 73, 0.1);
            border: 1px solid rgba(248, 81, 73, 0.4);
            color: #f85149;
        }

        .success-message {
            background: rgba(35, 134, 54, 0.1);
            border: 1px solid rgba(35, 134, 54, 0.4);
            color: var(--accent-green);
        }

        .error-message.show, .success-message.show {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        .terms {
            text-align: center;
            margin-top: 25px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .terms a {
            color: var(--accent-blue);
            text-decoration: none;
        }

        .terms a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            body {
                align-items: flex-start;
                padding: 15px;
            }
            
            .auth-container {
                padding: 10px;
                max-width: 100%;
            }
            
            .auth-card {
                padding: 30px 20px;
            }
            
            .logo a {
                font-size: 1.4rem;
            }
            
            .logo a i {
                font-size: 1.6rem;
            }
            
            .tab-btn {
                padding: 10px;
                font-size: 0.85rem;
            }
            
            .input-group label {
                font-size: 0.85rem;
            }
            
            .input-wrapper input {
                padding: 12px 12px 12px 40px;
                font-size: 0.95rem;
            }
            
            .input-wrapper input[type="password"],
            .input-wrapper input.password-input {
                padding-right: 45px;
            }
            
            .input-wrapper i.fa-lock,
            .input-wrapper i.fa-envelope,
            .input-wrapper i.fa-user {
                left: 12px;
            }
            
            .input-wrapper .toggle-password {
                right: 12px;
            }
            
            .submit-btn {
                padding: 12px;
            }
            
            .social-login {
                flex-direction: column;
            }
            
            .social-btn {
                padding: 14px;
            }
            
            .guest-btn {
                width: 100%;
                justify-content: center;
            }
            
            .gradient-orb:nth-child(1) {
                width: 250px;
                height: 250px;
            }
            
            .gradient-orb:nth-child(2) {
                width: 200px;
                height: 200px;
            }
            
            .gradient-orb:nth-child(3) {
                width: 150px;
                height: 150px;
            }
        }

        @media (max-width: 380px) {
            .auth-card {
                padding: 25px 15px;
            }
            
            .logo a {
                font-size: 1.2rem;
            }
            
            .tab-btn {
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <div class="gradient-orb"></div>
        <div class="gradient-orb"></div>
        <div class="gradient-orb"></div>
    </div>
    <div class="grid-pattern"></div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="logo">
                <a href="landing.html">
                    <i class="fas fa-gamepad"></i>
                    GameStyle<span>Hub</span>
                </a>
                <p>Your gaming marketplace awaits</p>
            </div>

            <div class="tab-switcher">
                <button class="tab-btn active" onclick="switchTab('login')">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
                <button class="tab-btn" onclick="switchTab('signup')">
                    <i class="fas fa-user-plus"></i> Sign Up
                </button>
            </div>

            <div class="error-message" id="errorMessage">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText"></span>
            </div>
            <div class="success-message" id="successMessage">
                <i class="fas fa-check-circle"></i>
                <span id="successText"></span>
            </div>

            <form class="auth-form active" id="loginForm">
                <div class="input-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <input type="email" id="loginEmail" placeholder="you@example.com" required>
                        <i class="fas fa-envelope"></i>
                    </div>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="loginPassword" class="password-input" placeholder="Enter your password" required>
                        <i class="fas fa-lock"></i>
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('loginPassword', this)"></i>
                    </div>
                </div>

                <div class="remember-forgot">
                    <label><input type="checkbox"> Remember me</label>
                    <a href="forgot-password.html">Forgot password?</a>
                </div>

                <button type="submit" class="submit-btn">
                    <span class="spinner"></span>
                    <span class="btn-text"><i class="fas fa-arrow-right"></i> Sign In</span>
                </button>

                <div class="divider"><span>or continue with</span></div>

                <div class="social-login">
                    <button type="button" class="social-btn google"><i class="fab fa-google"></i></button>
                    <button type="button" class="social-btn discord"><i class="fab fa-discord"></i></button>
                    <button type="button" class="social-btn github"><i class="fab fa-github"></i></button>
                </div>

                <div class="guest-login">
                    <button type="button" class="guest-btn" onclick="guestLogin()">
                        <i class="fas fa-user-secret"></i> Continue as Guest
                    </button>
                </div>
            </form>

            <form class="auth-form" id="signupForm">
                <div class="input-group">
                    <label>Full Name</label>
                    <div class="input-wrapper">
                        <input type="text" id="signupName" placeholder="John Doe" required>
                        <i class="fas fa-user"></i>
                    </div>
                </div>

                <div class="input-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <input type="email" id="signupEmail" placeholder="you@example.com" required>
                        <i class="fas fa-envelope"></i>
                    </div>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="signupPassword" class="password-input" placeholder="Create a password" required>
                        <i class="fas fa-lock"></i>
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('signupPassword', this)"></i>
                    </div>
                </div>

                <div class="input-group">
                    <label>Confirm Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="signupConfirmPassword" class="password-input" placeholder="Confirm password" required>
                        <i class="fas fa-lock"></i>
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('signupConfirmPassword', this)"></i>
                    </div>
                </div>

                <button type="submit" class="submit-btn">
                    <span class="spinner"></span>
                    <span class="btn-text"><i class="fas fa-rocket"></i> Create Account</span>
                </button>

                <div class="terms">
                    By signing up, you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>
                </div>
            </form>

            <div class="back-link">
                <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Home</a>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const signupForm = document.getElementById('signupForm');
            const tabs = document.querySelectorAll('.tab-btn');
            hideMessages();
            tabs.forEach(t => t.classList.remove('active'));
            if (tab === 'login') {
                tabs[0].classList.add('active');
                loginForm.classList.add('active');
                signupForm.classList.remove('active');
            } else {
                tabs[1].classList.add('active');
                signupForm.classList.add('active');
                loginForm.classList.remove('active');
            }
        }

        if (window.location.hash === '#signup') switchTab('signup');

        function togglePassword(inputId, icon) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        function showError(msg) {
            document.getElementById('errorText').textContent = msg;
            document.getElementById('errorMessage').classList.add('show');
            document.getElementById('successMessage').classList.remove('show');
        }

        function showSuccess(msg) {
            document.getElementById('successText').textContent = msg;
            document.getElementById('successMessage').classList.add('show');
            document.getElementById('errorMessage').classList.remove('show');
        }

        function hideMessages() {
            document.getElementById('errorMessage').classList.remove('show');
            document.getElementById('successMessage').classList.remove('show');
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = this.querySelector('.submit-btn');
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            if (!email || !password) { showError('Please fill in all fields'); return; }
            btn.classList.add('loading');
            hideMessages();
            
            const result = await firebaseAuth.signIn(email, password);
            btn.classList.remove('loading');
            
            if (result.success) {
                localStorage.setItem('gamestylehub-user', JSON.stringify({
                    name: result.user.displayName || email.split('@')[0], 
                    email, isLoggedIn: true, isGuest: false
                }));
                showSuccess('Login successful! Redirecting...');
                setTimeout(() => window.location.href = 'home.html', 1000);
            } else {
                showError(result.error || 'Login failed. Please try again.');
            }
        });

        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = this.querySelector('.submit-btn');
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const confirm = document.getElementById('signupConfirmPassword').value;
            if (!name || !email || !password || !confirm) { showError('Please fill in all fields'); return; }
            if (password !== confirm) { showError('Passwords do not match'); return; }
            if (password.length < 6) { showError('Password must be at least 6 characters'); return; }
            btn.classList.add('loading');
            hideMessages();
            
            const result = await firebaseAuth.signUp(email, password, name);
            btn.classList.remove('loading');
            
            if (result.success) {
                localStorage.setItem('gamestylehub-user', JSON.stringify({
                    name, email, isLoggedIn: true, isGuest: false
                }));
                showSuccess('Account created! Redirecting...');
                setTimeout(() => window.location.href = 'home.html', 1000);
            } else {
                showError(result.error || 'Sign up failed. Please try again.');
            }
        });

        async function guestLogin() {
            const result = await firebaseAuth.guestLogin();
            if (result.success) {
                localStorage.setItem('gamestylehub-user', JSON.stringify({
                    name: 'Guest', email: '', isLoggedIn: false, isGuest: true
                }));
                window.location.href = 'home.html';
            } else {
                showError('Guest login failed. Please try again.');
            }
        }

        document.querySelectorAll('.social-btn').forEach(btn => {
            btn.addEventListener('click', async function() {
                const platform = this.classList.contains('google') ? 'Google' : 
                               this.classList.contains('discord') ? 'Discord' : 'GitHub';
                showSuccess(`Connecting to ${platform}...`);
                
                let result;
                if (platform === 'Google') {
                    result = await firebaseAuth.signInWithGoogle();
                } else if (platform === 'GitHub') {
                    result = await firebaseAuth.signInWithGitHub();
                } else {
                    // Discord not natively supported, show message
                    showError('Discord login coming soon!');
                    return;
                }
                
                if (result.success) {
                    localStorage.setItem('gamestylehub-user', JSON.stringify({
                        name: result.user.displayName || `${platform} User`, 
                        email: result.user.email || `user@${platform.toLowerCase()}.com`,
                        isLoggedIn: true, isGuest: false
                    }));
                    window.location.href = 'home.html';
                } else {
                    showError(result.error || `${platform} login failed.`);
                }
            });
        });
    </script>
